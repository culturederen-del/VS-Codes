<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mainHUD.css">  
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

   
    <script src="menu-categories.js" defer></script>
    <script src="charStats.js" defer></script>
    <script src="UI-Functions.js" defer></script>
    <script src="mainHUD.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>

<body>

<div class="gradient-bg">
    <svg>
    <defs>
      <filter id="goo">
        <feBlend in="SourceGraphic" in2="goo" />
      </filter>
    </defs>
  </svg>
  <div class="gradients-container">
    <div class="g1"></div>
    <div class="g2"></div>
    <div class="g3"></div>
    <div class="g4"></div>
    <div class="g5"></div>
    <div class="interactive"></div>
  </div>
</div>

<div class="nameContainer">
 <div class="nameBox">
    <div class="nameInputs">
    <div class="nameTexts">Choose your name:</div>
    <input type="text" id="usernameInput" placeholder="Enter your username">
    <button id="submitUsername">Submit</button>
    </div>
    <div class="ep"></div>
 </div>
</div>

    <div class="mainHUDnav">
    <div class="gameTitle"> 

        <div class="gradientMask"> 
        <div class="letterGroup">
            <h1>
            <span class="first-char">B</span><span class="char">a</span><span class="char">t</span><span class="char">t</span><span class="char">l</span><span class="char">e</span><span class="char">W</span><span class="char">o</span><span class="char">r</span><span class="char">d</span><span class="char">s</span>
            </h1>
        </div>

        </div>
    </div>
    <div class="navContainer">
    <a href="" class="mainNavBtn" id="playBtn"><span>PLAY</span></a>
    <a href="" class="mainNavBtn"><span>SETTINGS</span></a>
    <a href="" class="mainNavBtn"><span>CREDITS</span></a>
    <a href="" class="mainNavBtn"><span>EXIT</span></a>
    </div>
    </div>


    <div class="catSubMenu" id="subMenu">
        <div class="catChoose">
        <!-- <h1 id="catChooseText">Choose a category and select what move type it is:</h1> -->
        <div class="whole">
            <div class="img-wrapper"> 
                <img class ="defaultImg" src="imgRes/Nouns.png">
                </div>      
            <button class="nounAnim" id="nounBtn">Noun</button>
        </div>
        <div class="whole">
            <div class="img-wrapper"> 
                <img class ="defaultImg" src="imgRes/Verbs.png">
            </div>      
            <button class="verbAnim" id="verbBtn">Verb</button>
        </div>
            <div class="whole">
            <div class="img-wrapper"> 
                <img class ="defaultImg" src="imgRes/Adjective.png">
                </div>  
                <button class="adjAnim" id="adjBtn">Adjective</button>
            </div>
            <div class="whole">
                <div class="img-wrapper"> 
                <img class ="defaultImg" src="imgRes/Adverbs.png">
                </div>    
                <button class="advAnim" id="advBtn">Adverb</button>
            </div>
            <div class="whole">
                <div class="img-wrapper"> 
                <img class ="defaultImg" src="imgRes/Pronoun.png">
                </div> 
                <button class="prnAnim" id="PrnBtn">Pronoun</button>       
            </div>

        </div>
    </div>


</body>
</html>

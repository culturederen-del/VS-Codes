<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="gamemode1.css">
<script src="training.js" defer></script>
<script src="charStats.js" defer></script>
<script src="randowrd.js" defer></script>  <!-- Loads first -->

<script src="UI-Functions.js" defer></script>

</head>
<body>

<div class="mainHUDnav" style="border:rgb(31, 31, 31) solid 2px; border-radius: 3px; padding: 10px; margin-bottom: 1rem;">
    <a href="mainHUD.html">Go Back</a>
</div>



<div id="upperGameDisplay" style="opacity:1">
<div class="userStateHUD">
    <div id="userStats"> 

    </div>
</div>
<br><br>

<div id="currentEnemyStateHud">
hi
</div>

<div id="timeElapsed"></div>
<div class="wordBox"></div>
    <h1 id="randomPairDisplay"></h1>
    <h2 id="categoryDisplay"></h2>

</div>

<div class="gameOverPopUp"> 
    <div class="gameOverDisplay">
        <div class="gameOverResponse">
        <h1> Oops! You ran out of time </h1>
        </div>
         <div class="imgContainer"> 
            <img class ="sadFace" src="imgRes/SadFaceFail.png">
         </div>      
        <h1> Your Score: 0000</h1>
        <a href="mainHUD.html" class="gameOverReturn"> Go Back</a>
    </div>

</div>


    <div id="inputSection" style="opacity:0; transition: opacity 0.5s; background-color: white;">
        <input type="text" id="wordInput" placeholder="Enter a word">
        <button id="wordSent">Confirm</button>
    </div>
</div>
    <h1 id="fumbleDisplay"></h1>

<div class="optionsUI" id="optUi" style ="border: 2px solid rgb(14, 143, 202); border-radius: 3px; margin-top: 15rem;"> 
    <br>
        <h1 id="output"> </h1>
        <div id="wrongOutput"></div>
        <div id="dialogBox" style="display:none; border: 2px solid black; padding: 10px; width: 300px;">
        <p id="dialogText"></p>
        </div>
    
    <div id="mainOpt">
        <div id ="actionDisplay">
        <button id="attackOpt">Attack</button>
        <button id="defendOpt">Defend</button>
        <button id="itemOpt">Item</button>
        <button id="runOpt">Run</button>
        </div>
        <div id="optButtons" class="hidden">
        <button id="PhysOpt">Prefix</button>
        <button id="MentOpt">Infix</button> 
        <button id="AstralOpt">Suffix</button>
        <button id="optClose">Close</button>
        </div>
    </div>
    
</div>
</body>
</html>
